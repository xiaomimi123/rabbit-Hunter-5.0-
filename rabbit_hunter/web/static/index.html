<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>Rabbit Hunter · 量化操盘台</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
  /* ============================================================
     Rabbit Hunter · 量化操盘台
     Linear + Vercel + Coinglass-inspired dark theme
     ============================================================ */

  :root {
    /* Backgrounds — layered depth */
    --bg-base:    #0a0d13;
    --bg-panel:   #10141d;
    --bg-card:    #141926;
    --bg-hover:   #1a2030;
    --bg-elev:    #1e2536;

    /* Borders */
    --border:      #232a3b;
    --border-lit:  #2f3752;

    /* Text */
    --text:        #e8ecf3;
    --text-mid:    #b3bdcc;
    --text-dim:    #7d8590;
    --text-mute:   #4e5666;

    /* Semantic */
    --up:          #22c55e;
    --up-glow:     rgba(34,197,94,0.14);
    --down:        #ef4444;
    --down-glow:   rgba(239,68,68,0.14);
    --warn:        #f59e0b;
    --warn-glow:   rgba(245,158,11,0.14);

    /* Accents */
    --accent:      #7c9df5;
    --accent-2:    #a78bfa;
    --accent-3:    #22d3ee;
    --gradient-primary: linear-gradient(135deg, #7c9df5 0%, #a78bfa 100%);
    --gradient-live:    linear-gradient(135deg, #22c55e 0%, #4ade80 100%);
    --gradient-alert:   linear-gradient(135deg, #ef4444 0%, #f97316 100%);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg-base);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei",
                 "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    font-size: 13px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .mono {
    font-family: "SF Mono", "JetBrains Mono", Menlo, Monaco, Consolas,
                 "Liberation Mono", monospace;
    font-variant-numeric: tabular-nums;
  }
  .up   { color: var(--up); }
  .down { color: var(--down); }
  .warn { color: var(--warn); }
  .dim  { color: var(--text-dim); }
  .mid  { color: var(--text-mid); }
  .mute { color: var(--text-mute); }

  /* =========== Top bar =========== */
  #topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 52px;
    background: linear-gradient(180deg, var(--bg-panel) 0%, rgba(16,20,29,0.9) 100%);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    position: sticky; top: 0; z-index: 10;
  }
  #topbar::after {
    content: ""; position: absolute; bottom: -1px; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%,
                                     var(--accent) 50%,
                                     transparent 100%);
    opacity: 0.35;
  }
  .brand {
    display: flex; align-items: center; gap: 12px;
    font-weight: 700; font-size: 13px; letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .brand-logo {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 7px;
    background: var(--gradient-primary);
    box-shadow: 0 4px 12px rgba(124,157,245,0.35);
  }
  .brand-name .grad {
    background: var(--gradient-primary);
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
  }
  .brand-ver { color: var(--text-mute); font-size: 11px; margin-left: 6px; letter-spacing: 0.08em; }

  .status-cluster {
    display: flex; align-items: center; gap: 20px;
    font-size: 12px; color: var(--text-dim);
  }
  .status-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 5px 12px; border-radius: 999px;
    background: rgba(34,197,94,0.08);
    border: 1px solid rgba(34,197,94,0.22);
    color: var(--up);
    font-weight: 500;
  }
  .status-pill.stale { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.22); color: var(--warn); }
  .status-pill.down  { background: rgba(239,68,68,0.08);  border-color: rgba(239,68,68,0.22);  color: var(--down); }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
    50%      { box-shadow: 0 0 0 4px transparent; opacity: 0.6; }
  }
  .clock {
    color: var(--text-dim); font-size: 12px; font-variant-numeric: tabular-nums;
  }

  /* =========== Layout =========== */
  #layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 52px); }

  #sidebar {
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    padding: 20px 0;
  }
  .nav-group-label {
    padding: 6px 24px; font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-mute); font-weight: 600;
    margin-top: 4px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 24px; color: var(--text-mid);
    text-decoration: none; font-size: 13.5px; cursor: pointer;
    font-weight: 500;
    position: relative;
    transition: color 0.15s ease, background 0.15s ease;
  }
  .nav-item .icon {
    width: 18px; height: 18px; flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text-dim);
    transition: color 0.15s ease;
  }
  .nav-item:hover {
    color: var(--text); background: var(--bg-hover);
  }
  .nav-item:hover .icon { color: var(--text-mid); }
  .nav-item.active {
    color: var(--text);
    background: linear-gradient(90deg, rgba(124,157,245,0.1) 0%, transparent 90%);
  }
  .nav-item.active::before {
    content: ""; position: absolute; left: 0; top: 8px; bottom: 8px; width: 3px;
    background: var(--gradient-primary); border-radius: 0 3px 3px 0;
    box-shadow: 0 0 10px rgba(124,157,245,0.6);
  }
  .nav-item.active .icon { color: var(--accent); }

  main {
    padding: 28px 32px 60px;
    overflow-y: auto;
    max-width: 1600px;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .page-title {
    display: flex; align-items: baseline; gap: 12px;
    margin: 0 0 22px 0;
  }
  .page-title h1 {
    margin: 0; font-size: 20px; font-weight: 600; letter-spacing: -0.01em;
    color: var(--text);
  }
  .page-title .sub {
    color: var(--text-dim); font-size: 13px; font-weight: 400;
  }

  /* =========== KPI cards =========== */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .kpi {
    position: relative; overflow: hidden;
    background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg-panel) 100%);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 18px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset,
                0 6px 20px -8px rgba(0,0,0,0.5);
    transition: transform 0.2s ease, border-color 0.2s ease;
  }
  .kpi:hover { transform: translateY(-1px); border-color: var(--border-lit); }
  .kpi::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--gradient-primary); opacity: 0.5;
  }
  .kpi.up::before  { background: var(--gradient-live); }
  .kpi.down::before{ background: var(--gradient-alert); }
  .kpi .label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text-mute); margin-bottom: 8px; font-weight: 600;
  }
  .kpi .value {
    font-size: 26px; font-weight: 600; letter-spacing: -0.02em;
    line-height: 1.2;
    font-variant-numeric: tabular-nums;
    font-family: "SF Mono", "JetBrains Mono", Menlo, Monaco, Consolas, monospace;
  }
  .kpi .sub {
    font-size: 12px; color: var(--text-dim); margin-top: 4px;
  }

  /* =========== Panels =========== */
  .panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 16px; overflow: hidden;
    box-shadow: 0 1px 0 rgba(255,255,255,0.02) inset,
                0 4px 16px -6px rgba(0,0,0,0.4);
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, var(--bg-elev) 0%, transparent 100%);
  }
  .panel-title {
    font-size: 13px; font-weight: 600; color: var(--text);
    letter-spacing: -0.01em;
  }
  .panel-badge {
    padding: 2px 10px; border-radius: 999px;
    background: rgba(124,157,245,0.1); color: var(--accent);
    font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
  }
  .panel-badge.up   { background: rgba(34,197,94,0.12); color: var(--up); }
  .panel-badge.warn { background: rgba(245,158,11,0.12); color: var(--warn); }
  .panel-badge.down { background: rgba(239,68,68,0.12); color: var(--down); }
  .panel-badge.dim  { background: rgba(125,133,144,0.12); color: var(--text-dim); }
  .panel-body { padding: 16px 20px; }
  .panel-body.no-pad { padding: 0; }

  /* =========== Tables =========== */
  table.data {
    width: 100%; border-collapse: collapse; font-size: 13px;
    font-variant-numeric: tabular-nums;
  }
  table.data th, table.data td {
    padding: 11px 16px; text-align: right;
    border-bottom: 1px solid var(--border);
  }
  table.data th:first-child, table.data td:first-child { text-align: left; }
  table.data thead th {
    background: transparent; color: var(--text-mute);
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.1em;
    font-weight: 600; padding-top: 12px; padding-bottom: 12px;
  }
  table.data tbody tr {
    transition: background 0.12s ease;
  }
  table.data tbody tr:hover {
    background: linear-gradient(90deg, rgba(255,255,255,0.02) 0%, transparent 100%);
  }
  table.data tbody tr.selected {
    background: linear-gradient(90deg, rgba(124,157,245,0.1) 0%, rgba(124,157,245,0.02) 100%);
  }
  table.data tbody tr.selected td:first-child {
    box-shadow: inset 3px 0 0 var(--accent);
  }
  table.data tbody tr:last-child td { border-bottom: none; }
  table.data .num {
    font-family: "SF Mono", "JetBrains Mono", Menlo, Monaco, Consolas, monospace;
  }

  /* =========== Badges =========== */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 6px;
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 700; font-family: "SF Mono", monospace;
  }
  .badge.up   { background: rgba(34,197,94,0.12);  color: var(--up); }
  .badge.down { background: rgba(239,68,68,0.12);  color: var(--down); }
  .badge.warn { background: rgba(245,158,11,0.12); color: var(--warn); }
  .badge.dim  { background: rgba(125,133,144,0.1); color: var(--text-dim); }
  .badge.accent{ background: rgba(124,157,245,0.14); color: var(--accent); }

  /* =========== Grid utilities =========== */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  @media (max-width: 900px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    #layout { grid-template-columns: 60px 1fr; }
    .nav-item span:not(.icon) { display: none; }
    .nav-group-label { text-align: center; padding: 6px 8px; }
  }

  /* =========== Charts =========== */
  svg.chart { display: block; width: 100%; height: 220px; }

  /* =========== Empty states =========== */
  .empty {
    padding: 40px 20px; text-align: center;
    color: var(--text-mute); font-size: 13px;
  }
  .empty .icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 44px; height: 44px; border-radius: 12px;
    background: var(--bg-elev); color: var(--text-mute);
    margin-bottom: 12px;
  }
  .empty .msg { display: block; margin-bottom: 6px; color: var(--text-dim); }
  .empty code { background: var(--bg-elev); padding: 2px 8px; border-radius: 5px;
                color: var(--accent); font-size: 12px; }

  /* =========== Preformatted =========== */
  pre {
    margin: 0; padding: 12px 14px;
    background: var(--bg-panel); border-radius: 8px;
    font-family: "SF Mono", "JetBrains Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 12px; line-height: 1.55;
    color: var(--text-mid); white-space: pre-wrap; word-break: break-word;
    max-height: 620px; overflow-y: auto;
  }

  /* =========== Links =========== */
  a.link {
    color: var(--accent); text-decoration: none; cursor: pointer;
    transition: color 0.12s;
  }
  a.link:hover { color: var(--accent-2); text-decoration: underline; }

  /* =========== Loading skeleton =========== */
  .loading {
    padding: 40px; text-align: center; color: var(--text-mute); font-size: 12px;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .loading::after {
    content: ""; display: inline-block; width: 4px; height: 4px; margin-left: 6px;
    border-radius: 50%; background: var(--accent);
    box-shadow: 8px 0 0 var(--accent), 16px 0 0 var(--accent);
    animation: dots 1.4s ease-in-out infinite;
  }
  @keyframes dots {
    0%,80%,100% { opacity: 0.25; }
    40%         { opacity: 1; }
  }
</style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <div class="brand">
    <span class="brand-logo">

  <main id="main">

<script>
/* ===================== Utilities ===================== */
const fmtCur = (n, dp=2) => (n == null ? "—" : (n < 0 ? "-" : "") + "$" + Math.abs(n).toLocaleString(undefined, { minimumFractionDigits: dp, maximumFractionDigits: dp }));
const fmtNum = (n, dp=2) => (n == null || isNaN(n) ? "—" : Number(n).toFixed(dp));
const fmtPct = (n, dp=2) => (n == null ? "—" : (n * 100).toFixed(dp) + "%");
const fmtPnl = (n, dp=2) => (n == null ? "—" : (n >= 0 ? "+" : "") + n.toLocaleString(undefined, { minimumFractionDigits: dp, maximumFractionDigits: dp }));
const fmtTime = ms => ms ? new Date(ms).toISOString().replace("T", " ").slice(0, 19) + " UTC" : "";
const upDown = n => n > 0 ? "up" : n < 0 ? "down" : "dim";
const kpiCls = n => n > 0 ? "up" : n < 0 ? "down" : "";

async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

/* ===================== 中文映射 ===================== */
const CLUSTER_CN = {
  "1_momentum_breakdown":  "动量崩跌",
  "2_momentum_breakout":   "动量突破",
  "3_range_breakout":      "区间突破",
  "4_trend_continuation":  "顺势延续",
  "5_trend_reversal":      "趋势反转",
  "6_other":               "其他",
};
const STATUS_CN = {
  healthy: "健康", stale: "滞后", gaps: "有缺口",
  missing: "缺失", empty: "空文件",
};
const SIDE_CN = { long: "多", short: "空" };
const EXIT_CN = {
  take_profit: "止盈", stop_loss: "止损",
  timeout: "超时", trailing_stop: "移动止损",
  circuit_breaker: "熔断", funding_settlement: "资金费结算",
};
const ACTION_CN = {
  promote: "已启用", no_prior_active: "首次启用",
  reject_no_improvement: "拒绝-无提升",
  reject_below_min: "拒绝-低于阈值",
  reject_error: "训练异常",
};

/* ===================== Router ===================== */
const views = {};
let currentView = "dashboard";
let refreshHandle = null;

function nav(view) {
  if (currentView !== view) window.selectedBacktest = null;
  currentView = view;
  document.querySelectorAll("#sidebar .nav-item").forEach(a => {
    a.classList.toggle("active", a.dataset.view === view);
  });
  if (refreshHandle) clearInterval(refreshHandle);
  const render = views[view] || views.dashboard;
  render();
  refreshHandle = setInterval(render, 30_000);
}

/* ===================== Live status pill ===================== */
async function refreshTick() {
  try {
    const s = await api("/api/shadow/state");
    const pill = document.getElementById("tick-status");
    const txt  = document.getElementById("tick-status-text");
    pill.classList.remove("stale", "down");
    if (!s.has_ledger) {
      pill.classList.add("stale");
      txt.textContent = "无账本";
    } else {
      const stale = s.minutes_since_last_bar > 120;
      const errs  = s.consecutive_errors >= 3;
      if (errs)      { pill.classList.add("down");  txt.textContent = "异常"; }
      else if (stale){ pill.classList.add("stale"); txt.textContent = "滞后"; }
      else           {                              txt.textContent = "运行中"; }
    }
    document.getElementById("tick-time").textContent =
      new Date().toISOString().replace("T", " ").slice(0, 19);
  } catch { /* ignore */ }
}
setInterval(refreshTick, 15_000);
refreshTick();

/* ===================== Chart utility ===================== */
function svgLineChart(points, valueKey, opts = {}) {
  const { height = 220, stroke = "#7c9df5", gradientId = "gLine",
          fillFrom = "rgba(124,157,245,0.28)",
          fillTo   = "rgba(124,157,245,0.02)" } = opts;
  if (!points.length) return emptyState("暂无数据");
  const vals = points.map(p => p[valueKey]);
  const yMin = Math.min(...vals), yMax = Math.max(...vals);
  const yRange = (yMax - yMin) || 1;
  const w = 1000, h = height, pad = 24;
  const iw = w - 2 * pad, ih = h - 2 * pad;
  const pts = vals.map((v, i) => {
    const x = pad + (i / (vals.length - 1 || 1)) * iw;
    const y = pad + (1 - (v - yMin) / yRange) * ih;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  const area = `${pad},${pad + ih} ` + pts + ` ${pad + iw},${pad + ih}`;
  return `<svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="${gradientId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${fillFrom}"/>
        <stop offset="100%" stop-color="${fillTo}"/>
      </linearGradient>
    </defs>
    <polygon points="${area}" fill="url(#${gradientId})" stroke="none"/>
    <polyline points="${pts}" fill="none" stroke="${stroke}" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
    <text x="${pad}" y="16" fill="#7d8590" font-size="10" font-family="system-ui">
      峰值 ${yMax.toLocaleString(undefined, {maximumFractionDigits: 2})}
    </text>
    <text x="${pad}" y="${h - 6}" fill="#7d8590" font-size="10" font-family="system-ui">
      低点 ${yMin.toLocaleString(undefined, {maximumFractionDigits: 2})}
    </text>
  </svg>`;
}

function emptyState(msg, hint = "") {
  return `<div class="empty">
    <span class="icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>
    </span>
    <span class="msg">${msg}</span>
    ${hint ? `<span class="mute" style="font-size:11px">${hint}</span>` : ""}
  </div>`;
}

        <div class="panel-header"><span class="panel-title">重训审计日志</span></div>
        <div class="panel-body ${log.entries.length ? 'no-pad' : ''}">
          ${log.entries.length === 0 ? emptyState("暂无重训记录") : `
            <table class="data"><thead><tr>
              <th>时间 (UTC)</th><th>动作</th><th>候选 AUC</th><th>原因</th></tr></thead><tbody>
            ${log.entries.map(e => {
              const isPromote = e.action === "promote" || e.action === "no_prior_active";
              return `<tr>
                <td class="mono dim">${(e.timestamp || "").slice(0, 19)}</td>
                <td><span class="badge ${isPromote ? 'up' : 'down'}">${ACTION_CN[e.action] || e.action}</span></td>
                <td class="num">${fmtNum(e.candidate_test_auc, 4)}</td>
                <td class="mute">${e.reason}</td>
              </tr>`;
            }).join("")}</tbody></table>`}
        </div>
      </div>`;
  } catch (e) {
    document.getElementById("body").innerHTML = emptyState(`加载失败: ${e.message}`);
  }
};

/* ===================== View: 配置管理 ===================== */
views.config = async () => {
  const el = document.getElementById("content");
  el.innerHTML = `
    <div class="page-title">
      <h1>配置管理</h1><span class="sub">当前配置与历史快照</span>
    </div>
    <div id="body"><div class="loading">加载中</div></div>`;
  try {
    const [current, hist] = await Promise.all([
      api("/api/config/current"),
      api("/api/config/history"),
    ]);
    document.getElementById("body").innerHTML = `
      <div class="grid-2">
        <div class="panel">
          <div class="panel-header"><span class="panel-title">当前配置 (default.yaml)</span></div>
          <div class="panel-body"><pre>${current.content ? escapeHtml(current.content) : "(缺失)"}</pre></div>
        </div>
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">快照历史</span>
            <span class="panel-badge">${hist.entries.length}</span>
          </div>
          <div class="panel-body ${hist.entries.length ? 'no-pad' : ''}">
            ${hist.entries.length === 0 ? emptyState("暂无快照") : `
              <table class="data"><thead><tr>
                <th>序号</th><th>哈希</th><th>时间戳</th><th>备注</th></tr></thead><tbody>
              ${hist.entries.map(e => `<tr>
                <td class="mute">${e.index}</td>
                <td class="mono">${e.config_hash}</td>
                <td class="mono dim">${e.timestamp_utc.slice(0, 19)}</td>
                <td class="mute">${e.note}</td>
              </tr>`).join("")}</tbody></table>`}
          </div>
        </div>
      </div>
      ${hist.entries.length >= 2 ? renderDiffPanel() : ""}`;
    if (hist.entries.length >= 2) loadDiff();
  } catch (e) {
    document.getElementById("body").innerHTML = emptyState(`加载失败: ${e.message}`);
  }
};

function renderDiffPanel() {
  return `<div class="panel">
    <div class="panel-header"><span class="panel-title">对比 · 上一版本 vs 最新</span></div>
    <div class="panel-body"><pre id="config-diff">加载中…</pre></div>
  </div>`;
}

async function loadDiff() {
  try {
    const d = await api("/api/config/diff?rev_a=previous&rev_b=latest");
    const el = document.getElementById("config-diff");
    if (!d.diff) { el.textContent = "(无变更)"; return; }
    el.innerHTML = d.diff.split("\n").map(line => {
      if (line.startsWith("+") && !line.startsWith("+++")) return `<span class="up">${escapeHtml(line)}</span>`;
      if (line.startsWith("-") && !line.startsWith("---")) return `<span class="down">${escapeHtml(line)}</span>`;
      if (line.startsWith("@@")) return `<span class="mute">${escapeHtml(line)}</span>`;
      return escapeHtml(line);
    }).join("\n");
  } catch { /* silent */ }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
}

/* ===================== View: 数据健康 ===================== */

            ${d.reports.map(r => `<tr>

  } catch (e) {

  }
};
