<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>Rabbit Hunter · 观测台</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
  /* ============================================================
     Rabbit Hunter · Field Recorder
     A long-baseline observation console. The subject is what the
     system actually does: listen to nine channels once per bar, log
     what came in, mark spikes when something crossed threshold.
     ============================================================ */

  :root {
    --paper:   #EEE7D7;   /* recording tape */
    --paper-2: #E5DDC8;   /* elevated tape (slight tint down) */
    --paper-3: #DBD3BC;   /* pressed tape (panel body) */
    --ink:     #171412;   /* warm near-black */
    --ink-2:   #453e34;   /* muted ink */
    --ink-3:   #7a7161;   /* faded ink */
    --rule:    #B7AE99;   /* ruled line */
    --rule-2:  #CFC7B2;   /* very faint rule */
    --pen:     #9C3B1E;   /* sienna — active pen, gains, primary CTA */
    --pen-2:   #7d2f18;   /* pressed pen */
    --pen-tint:#e6c8b8;   /* pen-tinted fill */
    --gauge:   #2A5A5C;   /* instrument teal — baselines, calm data */
    --gauge-tint: #b5cccc;
    --alarm:   #D69831;   /* amber warning — losses, staleness */
    --alarm-tint: #f3daa8;
    --critical:#B03A2E;   /* only for genuine system alarms */
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: "JetBrains Mono", "Fira Code", "SF Mono",
                 Menlo, Consolas, ui-monospace, monospace;
    font-size: 12.5px;
    line-height: 1.55;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.005em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    /* Very faint diagonal weave — like actual recording paper */
    background-image:
      repeating-linear-gradient(90deg,
        transparent 0, transparent 40px,
        rgba(23,20,18,0.015) 40px, rgba(23,20,18,0.015) 41px);
  }
  .serif {
    font-family: ui-serif, "Iowan Old Style", "Cormorant Garamond",
                 Georgia, "Times New Roman", serif;
    font-style: italic;
    letter-spacing: 0.01em;
  }
  .pen   { color: var(--pen); }
  .alarm { color: var(--alarm); }
  .gauge { color: var(--gauge); }
  .ink-3 { color: var(--ink-3); }
  .ink-2 { color: var(--ink-2); }

  /* ============================================================
     Top strip — thin, all-mono, brand + status + clock
     ============================================================ */
  .strip {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 24px;
    background: var(--paper-2);
    border-bottom: 1px solid var(--rule);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    position: sticky; top: 0; z-index: 5;
  }
  .strip-left, .strip-right {
    display: flex; align-items: center; gap: 18px;
  }
  .brand-mark {
    font-family: ui-serif, "Iowan Old Style", Georgia, serif;
    font-style: italic;
    font-size: 15px;
    letter-spacing: 0.03em;
    color: var(--ink);
    text-transform: none;
  }
  .brand-mark::before {
    content: "R.H."; margin-right: 8px;
    font-style: normal;
    letter-spacing: 0.15em;
    color: var(--pen);
    font-size: 11px;
  }
  .status {
    display: inline-flex; align-items: center; gap: 8px;
  }
  .status::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: var(--gauge);
  }
  .status.stale::before { background: var(--alarm); }
  .status.down::before  { background: var(--critical); }
  .cmdk-hint {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 8px;
    background: var(--paper);
    border: 1px solid var(--rule);
    color: var(--ink-2);
    cursor: pointer;
    text-transform: none;
    letter-spacing: 0.02em;
  }
  .cmdk-hint:hover {
    color: var(--pen); border-color: var(--pen);
  }
  .cmdk-hint .kbd {
    background: var(--paper-3); padding: 0 4px; border-radius: 1px;
    font-size: 10px;
  }

  /* ============================================================
     Layout
     ============================================================ */
  #layout {
    display: grid;
    grid-template-columns: 168px 1fr;
    min-height: calc(100vh - 42px);
  }
  @media (max-width: 900px) {
    #layout { grid-template-columns: 60px 1fr; }
    .nav-label { display: none; }
  }

  /* ============================================================
     Sidebar — mono labels, no icons, sequence markers
     ============================================================ */
  nav.side {
    background: var(--paper-2);
    border-right: 1px solid var(--rule);
    padding: 20px 0 40px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 20px;
    color: var(--ink-2);
    text-decoration: none; cursor: pointer;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    position: relative;
  }
  .nav-item:hover { color: var(--pen); background: var(--paper-3); }
  .nav-item.active {
    color: var(--pen);
    background: var(--paper-3);
  }
  .nav-item.active::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--pen);
  }
  .nav-mark {
    font-family: ui-serif, Georgia, serif;
    font-style: italic; font-size: 12px;
    color: var(--ink-3); width: 14px;
    letter-spacing: 0;
  }
  .nav-item.active .nav-mark { color: var(--pen); }
  .nav-section {
    padding: 20px 20px 6px;
    font-size: 10px; letter-spacing: 0.14em;
    color: var(--ink-3); text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  .nav-section::after {
    content: ""; flex: 1; height: 1px; background: var(--rule);
  }

  /* ============================================================
     Main content
     ============================================================ */
  main {
    padding: 0;
    overflow-y: auto;
    background: var(--paper);
  }
  .page-title {
    padding: 22px 32px 6px;
    font-family: ui-serif, "Iowan Old Style", "Cormorant Garamond",
                 Georgia, "Times New Roman", serif;
    font-style: italic;
    font-size: 28px;
    font-weight: 400;
    letter-spacing: -0.005em;
    color: var(--ink);
  }
  .page-sub {
    padding: 0 32px 18px;
    font-size: 11.5px;
    color: var(--ink-3);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .page-body { padding: 0 32px 60px; }

  /* ============================================================
     THE RIBBON — signature element. Full-width ambient waveform.
     Only animated element on the page (Chanel: one accessory).
     ============================================================ */
  .ribbon {
    position: relative;
    height: 42px;
    background: var(--paper-2);
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    overflow: hidden;
    margin-bottom: 18px;
  }
  .ribbon svg { display: block; width: 100%; height: 100%; }
  .ribbon .ribbon-cap {
    position: absolute; top: 6px; right: 12px;
    font-size: 10px; color: var(--ink-3);
    letter-spacing: 0.1em; text-transform: uppercase;
    background: var(--paper-2); padding: 0 4px;
  }
  .ribbon .ribbon-cap b { color: var(--ink); font-weight: 400; }

  /* ============================================================
     Channel strips — the primary content on the live view.
     Not KPI cards. Horizontal traces with marginalia.
     ============================================================ */
  .channel {
    display: grid;
    grid-template-columns: 22px 1fr 220px;
    border-bottom: 1px solid var(--rule-2);
    align-items: center;
    padding: 14px 0;
    min-height: 68px;
    position: relative;
  }
  .channel:first-child { border-top: 1px solid var(--rule); }
  .channel-mark {
    color: var(--ink-3); font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; text-align: center;
  }
  .channel-body {
    display: flex; flex-direction: column; gap: 4px;
    padding-right: 20px;
  }
  .channel-header {
    display: flex; align-items: baseline; gap: 12px;
    font-size: 13.5px;
  }
  .channel-symbol {
    font-weight: 500; letter-spacing: 0.02em;
    color: var(--ink);
  }
  .channel-meta {
    color: var(--ink-3); font-size: 11px; letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .channel-trace {
    width: 100%; height: 30px;
  }
  .channel-marg {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 4px 14px;
    font-size: 10.5px;
    color: var(--ink-3);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding-left: 14px;
    border-left: 1px solid var(--rule);
    align-content: center;
  }
  .channel-marg b {
    color: var(--ink); font-weight: 500;
    display: block; font-size: 12px;
    text-transform: none; letter-spacing: 0;
    font-family: "JetBrains Mono", Menlo, monospace;
  }

  /* ============================================================
     Log column (dashboard right side)
     ============================================================ */
  .live-grid {
    display: grid;
    grid-template-columns: 1fr 240px;
    gap: 0 24px;
  }
  @media (max-width: 1100px) { .live-grid { grid-template-columns: 1fr; } }
  .log {
    border-left: 1px solid var(--rule);
    padding: 0 0 0 22px;
  }
  .log-header {
    font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--ink-3);
    padding: 14px 0 10px;
    border-bottom: 1px solid var(--rule);
  }
  .log-entry {
    padding: 10px 0;
    border-bottom: 1px solid var(--rule-2);
    font-size: 11px;
  }
  .log-time {
    color: var(--ink-3); font-size: 10px; letter-spacing: 0.06em;
  }
  .log-msg { color: var(--ink); margin-top: 3px; }
  .log-msg .pen { color: var(--pen); }

  /* ============================================================
     Marginalia — for pages other than the live view.
     Numbers appear in small monospace, labeled in tiny caps above.
     ============================================================ */
  .marg-row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    background: var(--paper-2);
    margin-bottom: 28px;
  }
  @media (max-width: 900px) { .marg-row { grid-template-columns: repeat(2, 1fr); } }
  .marg {
    padding: 14px 18px;
    border-right: 1px solid var(--rule-2);
    position: relative;
  }
  .marg:last-child { border-right: none; }
  .marg-label {
    font-size: 9.5px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--ink-3);
    margin-bottom: 4px;
  }
  .marg-val {
    font-size: 15px; font-weight: 400; letter-spacing: 0.01em;
    color: var(--ink);
    font-family: "JetBrains Mono", Menlo, monospace;
  }
  .marg-val.pen   { color: var(--pen); }
  .marg-val.alarm { color: var(--alarm); }
  .marg-hint {
    font-size: 10px; color: var(--ink-3); margin-top: 4px;
    letter-spacing: 0.02em;
  }

  /* ============================================================
     Panels — quiet, no cards. Sections with rule dividers.
     ============================================================ */
  section.panel {
    margin-bottom: 24px;
  }
  .panel-title {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0 8px;
    border-bottom: 1px solid var(--rule);
    font-size: 10.5px; letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-2);
  }
  .panel-count {
    font-size: 10px; color: var(--ink-3); letter-spacing: 0.06em;
  }

  /* ============================================================
     Tables — very quiet. Only rules between rows, no fill.
     ============================================================ */
  table.field {
    width: 100%; border-collapse: collapse;
    font-size: 12px;
  }
  table.field th, table.field td {
    padding: 10px 12px; text-align: right;
    border-bottom: 1px solid var(--rule-2);
    font-variant-numeric: tabular-nums;
  }
  table.field th:first-child, table.field td:first-child { text-align: left; }
  table.field thead th {
    background: transparent;
    border-bottom: 1px solid var(--rule);
    color: var(--ink-3);
    font-size: 10px; letter-spacing: 0.12em; font-weight: 400;
    text-transform: uppercase;
    padding-top: 12px; padding-bottom: 8px;
    position: sticky; top: 0;
    background: var(--paper);
  }
  table.field tbody tr:hover { background: var(--paper-2); }
  table.field tbody tr.selected { background: var(--paper-3); }
  table.field tbody tr.selected td:first-child {
    box-shadow: inset 2px 0 0 var(--pen);
  }

  /* ============================================================
     Side chips — "多 / 空" style. No pill background — just a
     letter with a bar underneath, like circuit-diagram markers.
     ============================================================ */
  .side-mark {
    display: inline-flex; align-items: baseline; gap: 4px;
    padding: 0 4px;
    font-size: 11px; letter-spacing: 0.06em;
    border-bottom: 2px solid currentColor;
    line-height: 1.2;
  }
  .side-long  { color: var(--pen); }
  .side-short { color: var(--gauge); }

  /* Directional arrows for a11y (keep) */
  .arrow {
    display: inline-block;
    font-family: ui-serif, Georgia, serif;
    font-style: normal;
    font-size: 10px;
    margin-right: 3px;
  }
  .arrow.up   { color: var(--pen); }
  .arrow.down { color: var(--alarm); }

  /* ============================================================
     Empty & loading states — instructional, one-line copy
     ============================================================ */
  .empty {
    padding: 40px 0;
    text-align: left;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    color: var(--ink-3);
    font-size: 12px;
    letter-spacing: 0.02em;
  }
  .empty .lead {
    display: block; color: var(--ink-2);
    margin-bottom: 4px; font-size: 13px;
  }
  .empty code {
    background: var(--paper-2); padding: 1px 6px;
    border: 1px solid var(--rule-2);
    color: var(--pen);
    font-size: 11px;
  }
  .loading {
    padding: 40px 0; text-align: left;
    color: var(--ink-3); font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .loading::after {
    content: " ..."; animation: dots 1.4s infinite;
  }
  @keyframes dots {
    0%, 20% { opacity: 0.2; }
    40% { opacity: 1; }
    100% { opacity: 0.2; }
  }

  /* Skeleton */
  .skel {
    background: linear-gradient(90deg,
      var(--paper-2) 0%, var(--paper-3) 50%, var(--paper-2) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.6s infinite;
  }
  @keyframes shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  /* Preformatted config */
  pre.field {
    margin: 0; padding: 16px;
    background: var(--paper-2);
    border: 1px solid var(--rule);
    font-family: "JetBrains Mono", Menlo, monospace;
    font-size: 11px;
    line-height: 1.65;
    color: var(--ink);
    white-space: pre-wrap; word-break: break-word;
    max-height: 620px; overflow-y: auto;
  }
  pre.field .pen   { color: var(--pen); }
  pre.field .alarm { color: var(--alarm); }
  pre.field .mute  { color: var(--ink-3); }

  a.link { color: var(--pen); cursor: pointer; text-decoration: none;
           border-bottom: 1px dotted var(--pen); }
  a.link:hover { border-bottom-style: solid; }

  /* ============================================================
     Command palette (Cmd+K) — paper aesthetic
     ============================================================ */
  #cmdk {
    position: fixed; inset: 0;
    background: rgba(23,20,18,0.42);
    display: none; align-items: flex-start; justify-content: center;
    padding-top: 12vh; z-index: 40;
    animation: fadeIn 0.14s ease;
  }
  #cmdk.on { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .cmdk-panel {
    width: 90%; max-width: 620px;
    background: var(--paper);
    border: 1px solid var(--ink);
    box-shadow: 6px 6px 0 rgba(23,20,18,0.15);
    animation: pop 0.16s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  @keyframes pop {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .cmdk-head {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--rule);
    background: var(--paper-2);
  }
  .cmdk-head::before {
    content: "›"; color: var(--pen);
    font-family: ui-serif, Georgia, serif;
    font-style: italic; font-size: 18px;
    line-height: 1;
  }
  #cmdk-q {
    flex: 1; background: none; border: none; outline: none;
    color: var(--ink); font-family: inherit;
    font-size: 14px; padding: 0;
  }
  #cmdk-q::placeholder { color: var(--ink-3); }
  .cmdk-esc {
    padding: 2px 6px; background: var(--paper-3);
    color: var(--ink-3); font-size: 10px;
    border: 1px solid var(--rule);
  }
  .cmdk-list {
    max-height: 62vh; overflow-y: auto;
  }
  .cmdk-sec {
    padding: 10px 16px 4px;
    font-size: 10px; letter-spacing: 0.14em;
    color: var(--ink-3); text-transform: uppercase;
    border-top: 1px solid var(--rule-2);
  }
  .cmdk-item {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 16px;
    cursor: pointer;
    color: var(--ink-2);
    border-left: 3px solid transparent;
  }
  .cmdk-item.active {
    background: var(--paper-2);
    border-left-color: var(--pen);
    color: var(--ink);
  }
  .cmdk-item .cmdk-hint-r {
    margin-left: auto;
    font-size: 10.5px; color: var(--ink-3);
    letter-spacing: 0.02em;
  }
  .cmdk-empty { padding: 30px 16px; text-align: left;
                color: var(--ink-3); font-size: 12px; }

  /* Reduced motion — respect user preference */
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<!-- Top strip -->
<div class="strip">
  <div class="strip-left">
    <span class="brand-mark">Rabbit Hunter · <span class="serif">Field</span></span>
    <span id="status" class="status"><span id="status-txt">观测中</span></span>
  </div>
  <div class="strip-right">
    <span class="cmdk-hint" onclick="openCmdk()">
      查找 <span class="kbd">⌘K</span>
    </span>
    <span id="clock" class="ink-3"></span>
  </div>
</div>

<!-- Command palette -->
<div id="cmdk" onclick="if(event.target===this) closeCmdk()">
  <div class="cmdk-panel">
    <div class="cmdk-head">
      <input id="cmdk-q" placeholder="搜索页面 · 回放 · 模型" autocomplete="off"/>
      <span class="cmdk-esc">ESC</span>
    </div>
    <div id="cmdk-list" class="cmdk-list"></div>
  </div>
</div>

<div id="layout">
  <nav class="side">
    <div class="nav-section">操盘</div>
    <a class="nav-item" data-view="live">
      <span class="nav-mark serif">i.</span><span class="nav-label">实况</span>
    </a>
    <a class="nav-item" data-view="channels">
      <span class="nav-mark serif">ii.</span><span class="nav-label">通道</span>
    </a>

    <div class="nav-section">研究</div>
    <a class="nav-item" data-view="replay">
      <span class="nav-mark serif">iii.</span><span class="nav-label">回放</span>
    </a>
    <a class="nav-item" data-view="strata">
      <span class="nav-mark serif">iv.</span><span class="nav-label">分析</span>
    </a>
    <a class="nav-item" data-view="models">
      <span class="nav-mark serif">v.</span><span class="nav-label">模型</span>
    </a>

    <div class="nav-section">仪器</div>
    <a class="nav-item" data-view="config">
      <span class="nav-mark serif">vi.</span><span class="nav-label">参数</span>
    </a>
    <a class="nav-item" data-view="source">
      <span class="nav-mark serif">vii.</span><span class="nav-label">数据源</span>
    </a>
  </nav>

  <main>
    <div id="content"></div>
  </main>
</div>

<script>
/* ===================== Utilities ===================== */
const fmtCur = (n, dp=2) => n == null ? "—" :
  (n<0?"-":"") + "$" + Math.abs(n).toLocaleString(undefined,
    { minimumFractionDigits: dp, maximumFractionDigits: dp });
const fmtNum = (n, dp=2) => (n == null || isNaN(n)) ? "—" : Number(n).toFixed(dp);
const fmtPct = (n, dp=2) => n == null ? "—" : (n * 100).toFixed(dp) + "%";
const fmtPnl = (n, dp=2) => n == null ? "—" :
  (n >= 0 ? "+" : "") + n.toLocaleString(undefined,
    { minimumFractionDigits: dp, maximumFractionDigits: dp });
const fmtTime = ms => ms ? new Date(ms).toISOString().replace("T", " ").slice(0, 19) : "";
const penAlarm = n => n > 0 ? "pen" : n < 0 ? "alarm" : "ink-3";
const arrow = n => n > 0 ? '<span class="arrow up">▲</span>' :
                   n < 0 ? '<span class="arrow down">▼</span>' : '';
const esc = s => String(s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

/* ===================== 中文映射 ===================== */
const CLUSTER_CN = {
  "1_momentum_breakdown":  "动量崩跌",
  "2_momentum_breakout":   "动量突破",
  "3_range_breakout":      "区间突破",
  "4_trend_continuation":  "顺势延续",
  "5_trend_reversal":      "趋势反转",
  "6_other":               "其他",
};
const SIDE_CN = { long: "多", short: "空" };
const EXIT_CN = {
  take_profit: "止盈", stop_loss: "止损",
  timeout: "超时", trailing_stop: "移动止损",
  circuit_breaker: "熔断", funding_settlement: "资金费",
};
const ACTION_CN = {

/* ===================== Router ===================== */
const views = {};
let currentView = "live";
let refreshHandle = null;

function nav(view) {
  if (currentView !== view) window.selectedReplay = null;
  currentView = view;
  document.querySelectorAll(".nav-item").forEach(a =>
    a.classList.toggle("active", a.dataset.view === view));
  if (refreshHandle) clearInterval(refreshHandle);
  const render = views[view] || views.live;
  render();
  refreshHandle = setInterval(render, 30_000);
}

  a.addEventListener("click", () => nav(a.dataset.view)));

/* ===================== Live status ===================== */
async function refreshStatus() {
  try {
    const s = await api("/api/shadow/state");
    const el = document.getElementById("status");
    const t  = document.getElementById("status-txt");
    el.classList.remove("stale", "down");
    if (!s.has_ledger) { el.classList.add("stale"); t.textContent = "无账本"; }
    else if (s.consecutive_errors >= 3) { el.classList.add("down"); t.textContent = "异常"; }
    else if (s.minutes_since_last_bar > 120) { el.classList.add("stale"); t.textContent = "滞后"; }
    else { t.textContent = "观测中"; }
    document.getElementById("clock").textContent =
      new Date().toISOString().replace("T", " ").slice(0, 19);
  } catch { /* ignore */ }
}
setInterval(refreshStatus, 15_000);

/* ===================== SVG helpers ===================== */
function traceSVG(values, opts = {}) {
  const { w = 900, h = 30, stroke = "var(--gauge)",
          weight = 1.2 } = opts;
  if (!values || values.length < 2)
    return `<div class="ink-3" style="font-size:10px;padding:8px 0">缺少足够数据</div>`;
  const min = Math.min(...values), max = Math.max(...values);
  const r = (max - min) || 1;
  const pad = 2;
  const pts = values.map((v, i) => {
    const x = pad + (i / (values.length - 1)) * (w - 2 * pad);
    const y = pad + (1 - (v - min) / r) * (h - 2 * pad);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  return `<svg class="channel-trace" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${pts}" fill="none" stroke="${stroke}" stroke-width="${weight}"
              stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function ribbonSVG(points) {
  // Ribbon shows the tick heartbeat — vertical hash marks per metrics
  // snapshot, taller when the runner processed a new bar during that
  // tick. It's the ambient reminder that the console is actively
  // listening, not just showing snapshots.
  if (!points || points.length < 2) {
    return `<svg viewBox="0 0 1000 42" preserveAspectRatio="none">
      <line x1="0" y1="21" x2="1000" y2="21" stroke="var(--rule)" stroke-width="1"
            stroke-dasharray="1,3"/>
      <text x="12" y="27" fill="var(--ink-3)" font-family="JetBrains Mono, monospace"
            font-size="10">等待首次心跳</text>
    </svg>`;
  }
  const w = 1000, h = 42, pad = 4;
  const iw = w - 2 * pad;
  // Baseline at y=21 (mid). Each tick = a short hash mark.
  const marks = points.map((p, i) => {
    const x = pad + (i / (points.length - 1)) * iw;
    // Taller mark when open_positions > 0 or drawdown was rising;
    // shorter otherwise. Equity stays flat when no trades, so we key
    // off the tick's own rhythm, not the equity delta.
    const active = (p.open_positions || 0) > 0 || (p.alert_count || 0) > 0;
    const halfHeight = active ? 12 : 4;
    return `<line x1="${x.toFixed(1)}" y1="${21 - halfHeight}"
                   x2="${x.toFixed(1)}" y2="${21 + halfHeight}"
                   stroke="var(--pen)" stroke-width="1" opacity="${active ? 0.85 : 0.3}"/>`;
  }).join("");
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <line x1="0" y1="21" x2="1000" y2="21" stroke="var(--rule)" stroke-width="1"
          stroke-dasharray="1,3"/>
    ${marks}
  </svg>`;
}

function tradesTable(rows) {

    <span>系统开仓触发条件严苛（每标的 40 天约 1 次），空账本属预期</span>

    <th>标的</th><th>方向</th><th>盈亏</th><th>出场</th>
    <th>持仓（K 线）</th><th>时间</th></tr></thead><tbody>

function clustersTable(rows) {
  if (!rows.length) return `<div class="empty">
    <span class="lead">尚未有可分类交易</span>
    <span>需累积首笔已平仓交易后开始分层</span>

  return `<table class="field"><thead><tr>
    <th>层</th><th>笔数</th><th>胜率</th><th>总盈亏</th>
    <th>均值</th><th>盈亏比</th><th>夏普</th></tr></thead><tbody>
    ${rows.map(r => r.n === 0 ? `<tr>
      <td>${CLUSTER_CN[r.cluster] || r.cluster}<div class="ink-3"
        style="font-size:10px;margin-top:2px">${r.description}</div></td>
      <td colspan="6" class="ink-3">—</td>
    </tr>` : `<tr>
      <td>${CLUSTER_CN[r.cluster] || r.cluster}<div class="ink-3"
        style="font-size:10px;margin-top:2px">${r.description}</div></td>
      <td>${r.n}</td>
      <td class="${r.winrate >= 0.5 ? 'pen' : 'alarm'}">${fmtPct(r.winrate, 1)}</td>
      <td class="${penAlarm(r.total_pnl)}">${fmtPnl(r.total_pnl)}</td>

      <td>${r.profit_factor == null ? "∞" : fmtNum(r.profit_factor)}</td>
      <td>${fmtNum(r.sharpe_est)}</td>

}

views.live = async () => {
  const el = document.getElementById("content");
  el.innerHTML = `
    <div class="page-title">实况</div>
    <div class="page-sub">此刻九条通道 · 一条带子</div>
    <div id="live-body" class="page-body"><div class="loading">正在拾音</div></div>`;
  try {
    const [state, hist, positions, alerts, clusters, sourceHealth] = await Promise.all([
      api("/api/shadow/state"),
      api("/api/shadow/metrics-history?hours=168"),
      api("/api/shadow/positions"),
      api("/api/shadow/alerts?hours=24"),
      api("/api/analytics/clusters/shadow"),
      api("/api/data/health").catch(() => ({ reports: [], summary: {} })),
    ]);
    const body = document.getElementById("live-body");
    if (!state.has_ledger) {
      body.innerHTML = `<div class="empty">
        <span class="lead">影子账本尚未生成</span>
        <span>运行 <code>rabbit shadow run</code> 后此处出现波形</span>
      </div>`;
      return;
    }

    // Ribbon at the top — signature element
    const ribbon = `<div class="ribbon">
      ${ribbonSVG(hist.points)}
      <span class="ribbon-cap"><b>近 7 日</b> · ${hist.points.length} 个采样</span>
    </div>`;

    // Marginalia strip (KPI equivalents, but small and tight)
    const dd = state.drawdown_pct || 0;
    const marg = `<div class="marg-row">
      <div class="marg">
        <div class="marg-label">净值</div>
        <div class="marg-val ${penAlarm(state.total_pnl)}">${fmtCur(state.equity)}</div>
        <div class="marg-hint">${fmtCur(state.initial_capital, 0)} 起</div>
      </div>
      <div class="marg">
        <div class="marg-label">总盈亏</div>
        <div class="marg-val ${penAlarm(state.total_pnl)}">${arrow(state.total_pnl)}${fmtPnl(state.total_pnl)}</div>
        <div class="marg-hint">${fmtPct(state.pnl_pct)}</div>
      </div>
      <div class="marg">
        <div class="marg-label">回撤</div>
        <div class="marg-val ${dd >= 0.10 ? 'alarm' : ''}">${fmtPct(dd)}</div>
        <div class="marg-hint">距峰 ${fmtCur(state.peak_equity, 0)}</div>
      </div>
      <div class="marg">
        <div class="marg-label">胜率</div>
        <div class="marg-val">${fmtPct(state.winrate, 1)}</div>
        <div class="marg-hint">${state.closed_trades} 笔已平</div>
      </div>
      <div class="marg">
        <div class="marg-label">盈亏比</div>
        <div class="marg-val">${fmtNum(state.profit_factor)}</div>
        <div class="marg-hint">P.F.</div>
      </div>
      <div class="marg">
        <div class="marg-label">在仓</div>
        <div class="marg-val">${state.open_positions}</div>
        <div class="marg-hint">共 ${(sourceHealth.summary || {}).total || 0} 通道</div>
      </div>
    </div>`;

    // Channel strips — one per symbol
    const reports = sourceHealth.reports || [];
    const positionsBySym = {};
    for (const p of positions.positions) positionsBySym[p.symbol] = p;
    const channelRows = reports.map((r, i) => {
      const pos = positionsBySym[r.symbol];
      const staleTag = r.status !== 'healthy'
        ? `<span class="alarm" style="font-size:10px;letter-spacing:0.04em;text-transform:uppercase">${STATUS_CN[r.status] || r.status}</span>`
        : `<span class="gauge" style="font-size:10px;letter-spacing:0.04em;text-transform:uppercase">正常</span>`;
      const posTag = pos
        ? `<span class="side-mark ${pos.side==='long'?'side-long':'side-short'}">${SIDE_CN[pos.side]||pos.side} × ${pos.size.toFixed(4)}</span>`
        : `<span class="ink-3" style="font-size:10.5px">空仓</span>`;
      // No per-symbol price feed on the API yet — show an honest
      // 24-tick heartbeat rail instead of a fake price trace. Each dot
      // marks a listen for this channel over the last 24 hours; solid
      // when data was received, faint when a fetch attempt failed.
      const num = String(i + 1).padStart(2, "0");
      const heardHours = Math.min(r.rows, 24);
      const missedHours = 24 - heardHours;
      let dots = "";
      for (let k = 0; k < 24; k++) {
        const cx = 6 + k * ((900 - 12) / 23);
        const heard = k >= missedHours;
        dots += `<circle cx="${cx.toFixed(1)}" cy="15" r="${heard ? 2.4 : 1.6}"
                 fill="${heard ? (pos ? 'var(--pen)' : 'var(--gauge)') : 'var(--rule)'}"
                 opacity="${heard ? 1 : 0.6}"/>`;
      }
      const rail = `<svg class="channel-trace" viewBox="0 0 900 30" preserveAspectRatio="none">
        <line x1="6" y1="15" x2="894" y2="15" stroke="var(--rule-2)" stroke-width="1"
              stroke-dasharray="2,3"/>
        ${dots}
      </svg>`;
      return `<div class="channel">
        <div class="channel-mark">${num}</div>
        <div class="channel-body">
          <div class="channel-header">
            <span class="channel-symbol">${r.symbol}</span>
            <span class="channel-meta">${r.interval} · ${r.rows.toLocaleString()} bar · 近 24h 心跳</span>
          </div>
          ${rail}
        </div>
        <div class="channel-marg">
          <div>
            <div>状态</div><b>${staleTag}</b>
          </div>
          <div>
            <div>持仓</div><b>${posTag}</b>
          </div>
          <div>
            <div>最新</div><b class="ink-3" style="font-size:11px">${r.last_ts ? r.last_ts.slice(11, 16) : "—"}</b>
          </div>
          <div>
            <div>缺失</div><b class="${r.missing_bars ? 'alarm' : ''}">${r.missing_bars}</b>
          </div>
        </div>
      </div>`;
    }).join("");

    // Log column
    const logEntries = [];
    if (state.last_tick_ms) {
      logEntries.push({
        t: state.last_tick_ms,
        msg: `最近一次心跳 · <span class="pen">tick</span>`,
      });
    }
    for (const a of alerts.alerts.slice(0, 8)) {
      logEntries.push({ t: a.timestamp_ms, msg: `<span class="alarm">告警</span> ${esc(a.alerts)}` });
    }
    logEntries.sort((a, b) => (b.t || 0) - (a.t || 0));
    const logHtml = logEntries.length === 0
      ? `<div class="ink-3" style="padding:16px 0;font-size:11px">尚无事件</div>`
      : logEntries.slice(0, 10).map(e => `<div class="log-entry">
          <div class="log-time">${fmtTime(e.t).slice(11, 19)}</div>
          <div class="log-msg">${e.msg}</div>
        </div>`).join("");

    // Cluster panel at the bottom (deprioritized when 0 trades)
    const hasClusters = clusters.total_trades > 0;

    body.innerHTML = `
      ${ribbon}
      ${marg}
      <div class="live-grid">
        <div>
          <section class="panel">
            <div class="panel-title">
              <span>通道 · 全部 ${reports.length} 条</span>
              <span class="panel-count">按序号排列</span>
            </div>
            ${channelRows}
          </section>
          ${hasClusters ? `<section class="panel">
            <div class="panel-title">
              <span>层析 · 已平仓</span>
              <span class="panel-count">${clusters.total_trades} 笔</span>
            </div>
            ${clustersTable(clusters.clusters)}
          </section>` : ""}
        </div>
        <aside class="log">
          <div class="log-header">日志 · 24h</div>
          ${logHtml}
        </aside>
      </div>`;
  } catch (e) {
    document.getElementById("live-body").innerHTML =
      `<div class="empty"><span class="lead alarm">加载失败</span><span>${esc(e.message)}</span></div>`;
  }
};

async function loadDiff() {
  try {
    const d = await api("/api/config/diff?rev_a=previous&rev_b=latest");
    const el = document.getElementById("cdiff");
    if (!d.diff) { el.textContent = "(无变更)"; return; }
    el.innerHTML = d.diff.split("\n").map(line => {
      if (line.startsWith("+") && !line.startsWith("+++")) return `<span class="pen">${esc(line)}</span>`;
      if (line.startsWith("-") && !line.startsWith("---")) return `<span class="alarm">${esc(line)}</span>`;
      if (line.startsWith("@@")) return `<span class="mute">${esc(line)}</span>`;
      return esc(line);
    }).join("\n");
  } catch { /* silent */ }
}

/* ===================== Command palette ===================== */
const CMDK_PAGES = [
  { section: "页面", label: "实况", hint: "Live",     act: () => nav("live") },
  { section: "页面", label: "通道", hint: "Channels", act: () => nav("channels") },
  { section: "页面", label: "回放", hint: "Replay",   act: () => nav("replay") },
  { section: "页面", label: "分析", hint: "Strata",   act: () => nav("strata") },
  { section: "页面", label: "模型", hint: "Models",   act: () => nav("models") },
  { section: "页面", label: "参数", hint: "Config",   act: () => nav("config") },
  { section: "页面", label: "数据源", hint: "Source", act: () => nav("source") },
];
let cmdkIdx = 0, cmdkResults = [], cmdkDyn = { reports: [], models: [] };

async function loadCmdkDyn() {
  try {
    const [b, m] = await Promise.all([api("/api/backtests"), api("/api/models")]);
    cmdkDyn.reports = b.reports || [];
    cmdkDyn.models = m.models || [];
  } catch { /* silent */ }
}
function fuzzy(hay, need) {
  if (!need) return true;
  hay = hay.toLowerCase(); need = need.toLowerCase();
  let hi = 0;
  for (const c of need) { hi = hay.indexOf(c, hi); if (hi < 0) return false; hi++; }
  return true;
}
function renderCmdk(q = "") {
  const items = [...CMDK_PAGES];
  for (const r of cmdkDyn.reports.slice(0, 30)) items.push({
    section: "回放", label: r.name,
    hint: `${r.n_trades} 笔 · ${(r.total_pnl >= 0 ? "+" : "") + r.total_pnl.toFixed(0)}`,
    act: () => { nav("replay"); setTimeout(() => window.showReplay(r.name), 100); },
  });
  for (const m of cmdkDyn.models) items.push({
    section: "模型", label: m.version + (m.is_active ? " · 生效" : ""),
    hint: `AUC ${m.test_auc.toFixed(4)}`, act: () => nav("models"),
  });
  cmdkResults = items.filter(x =>
    fuzzy(x.label, q) || fuzzy(x.hint || "", q) || fuzzy(x.section, q));
  cmdkIdx = 0;
  const listEl = document.getElementById("cmdk-list");
  if (!cmdkResults.length) {
    listEl.innerHTML = `<div class="cmdk-empty">未匹配</div>`; return;
  }
  let html = "", last = null;
  cmdkResults.forEach((r, i) => {
    if (r.section !== last) { html += `<div class="cmdk-sec">${r.section}</div>`; last = r.section; }
    html += `<div class="cmdk-item ${i === cmdkIdx ? 'active' : ''}"
              data-idx="${i}" onclick="pick(${i})">
      <span>${esc(r.label)}</span>
      ${r.hint ? `<span class="cmdk-hint-r">${esc(r.hint)}</span>` : ""}
    </div>`;
  });
  listEl.innerHTML = html;
}
window.openCmdk = async () => {
  document.getElementById("cmdk").classList.add("on");
  const i = document.getElementById("cmdk-q"); i.value = ""; i.focus();
  if (!cmdkDyn.reports.length && !cmdkDyn.models.length) await loadCmdkDyn();
  renderCmdk("");
};
window.closeCmdk = () => document.getElementById("cmdk").classList.remove("on");
window.pick = (idx) => {
  const r = cmdkResults[idx]; if (!r) return;
  closeCmdk(); r.act();
};
document.getElementById("cmdk-q").addEventListener("input", e => renderCmdk(e.target.value.trim()));
document.addEventListener("keydown", e => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
    e.preventDefault(); openCmdk(); return;
  }
  const on = document.getElementById("cmdk").classList.contains("on");
  if (!on) return;
  if (e.key === "Escape") { closeCmdk(); return; }
  if (e.key === "ArrowDown") { e.preventDefault();
    cmdkIdx = Math.min(cmdkIdx + 1, cmdkResults.length - 1); updateActive(); }
  else if (e.key === "ArrowUp") { e.preventDefault();
    cmdkIdx = Math.max(cmdkIdx - 1, 0); updateActive(); }
  else if (e.key === "Enter") { e.preventDefault(); pick(cmdkIdx); }
});
function updateActive() {
  document.querySelectorAll(".cmdk-item").forEach(el => {
    el.classList.toggle("active", Number(el.dataset.idx) === cmdkIdx);
    if (Number(el.dataset.idx) === cmdkIdx) el.scrollIntoView({ block: "nearest" });
  });
}

/* ===================== Boot ===================== */
