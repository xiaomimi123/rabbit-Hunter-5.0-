<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Rabbit Hunter — Operator Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
  /* ===== Design system =====
     Bloomberg-terminal-inspired dark theme. All numbers monospace for
     alignment; three-color state system (green/red/amber); dense grid
     layout with clear card boundaries.
  */
  :root {
    --bg:        #0d1117;
    --bg-alt:    #161b22;
    --card:      #1a1f2a;
    --border:    #2b3140;
    --text:      #e6edf3;
    --text-dim:  #8b98a5;
    --text-mute: #576068;
    --up:        #26a269;
    --down:      #e5484d;
    --warn:      #f0b429;
    --accent:    #58a6ff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 "Helvetica Neue", Arial, sans-serif;
    font-size: 13px;
    line-height: 1.5;
  }
  .mono { font-family: "SF Mono", Menlo, Monaco, Consolas, monospace; }
  .up   { color: var(--up); }
  .down { color: var(--down); }
  .warn { color: var(--warn); }
  .dim  { color: var(--text-dim); }
  .mute { color: var(--text-mute); }

  /* ===== Layout — top bar / sidebar / main ===== */
  #topbar {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg-alt);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    height: 44px;
  }
  #topbar .brand {
    font-weight: 700; letter-spacing: 0.08em; font-size: 12px;
    color: var(--text); text-transform: uppercase;
  }
  #topbar .brand .accent { color: var(--accent); }
  #topbar .status {
    font-size: 11px; color: var(--text-dim);
    display: flex; align-items: center; gap: 16px;
  }
  #topbar .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--up); margin-right: 6px;
  }
  #topbar .dot.stale { background: var(--warn); }
  #topbar .dot.down  { background: var(--down); }

  #layout { display: grid; grid-template-columns: 180px 1fr; height: calc(100vh - 44px); }
  #sidebar {
    background: var(--bg-alt); border-right: 1px solid var(--border);
    padding: 16px 0; overflow-y: auto;
  }
  #sidebar .nav-item {
    display: block; padding: 10px 20px; color: var(--text-dim);
    text-decoration: none; font-size: 12px; cursor: pointer;
    border-left: 2px solid transparent; text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  #sidebar .nav-item:hover { background: rgba(255,255,255,0.03); color: var(--text); }
  #sidebar .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(88,166,255,0.06); }

  main { padding: 20px 24px; overflow-y: auto; }
  main h1 { font-size: 15px; text-transform: uppercase; letter-spacing: 0.06em;
             color: var(--text-dim); margin: 0 0 16px 0; font-weight: 600; }

  /* ===== KPI cards ===== */
  .kpi-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 20px;
  }
  .kpi {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 4px; padding: 12px 16px;
  }
  .kpi .label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-dim); margin-bottom: 4px;
  }
  .kpi .value {
    font-size: 20px; font-weight: 600; font-variant-numeric: tabular-nums;
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
  }
  .kpi .sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  /* ===== Panels & tables ===== */
  .panel {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 4px; margin-bottom: 16px; overflow: hidden;
  }
  .panel-header {
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-dim); background: rgba(255,255,255,0.02);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-header .count { color: var(--text-mute); font-size: 10px; }
  .panel-body { padding: 12px 16px; }
  .panel-body.no-pad { padding: 0; }

  table.data {
    width: 100%; border-collapse: collapse; font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  table.data th, table.data td {
    padding: 8px 12px; text-align: right;
    border-bottom: 1px solid var(--border);
  }
  table.data th:first-child, table.data td:first-child { text-align: left; }
  table.data thead th {
    background: rgba(255,255,255,0.02); color: var(--text-dim);
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 600; border-bottom: 1px solid var(--border);
  }
  table.data tbody tr:hover { background: rgba(255,255,255,0.02); }
  table.data .num { font-family: "SF Mono", Menlo, Monaco, Consolas, monospace; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  @media (max-width: 900px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
  }

  pre {
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 12px; margin: 0; white-space: pre-wrap;
    color: var(--text);
  }

  .empty { padding: 24px; text-align: center; color: var(--text-mute);
           font-size: 12px; }

  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 3px;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 600;
  }
  .badge.up    { background: rgba(38,162,105,0.15); color: var(--up); }
  .badge.down  { background: rgba(229,72,77,0.15);   color: var(--down); }
  .badge.warn  { background: rgba(240,180,41,0.15);  color: var(--warn); }
  .badge.dim   { background: rgba(139,152,165,0.12); color: var(--text-dim); }

  a.link { color: var(--accent); text-decoration: none; cursor: pointer; }
  a.link:hover { text-decoration: underline; }

  svg.chart { display: block; width: 100%; height: 200px; }

  select, button {
    background: var(--card); color: var(--text);
    border: 1px solid var(--border); border-radius: 3px;
    padding: 4px 10px; font-size: 12px;
    font-family: inherit;
  }
  button { cursor: pointer; }
  button:hover { border-color: var(--accent); }
</style>
</head>
<body>
<div id="topbar">
  <div class="brand">RABBIT<span class="accent"> HUNTER</span> <span class="mute mono" style="margin-left:12px">v0.2</span></div>
  <div class="status">
    <span id="tick-status"><span class="dot"></span>connecting…</span>
    <span id="tick-time" class="mono"></span>
  </div>
</div>

<div id="layout">
  <nav id="sidebar">
    <a class="nav-item" data-view="dashboard">Dashboard</a>
    <a class="nav-item" data-view="shadow">Shadow</a>
    <a class="nav-item" data-view="backtests">Backtests</a>
    <a class="nav-item" data-view="analytics">Analytics</a>
    <a class="nav-item" data-view="models">Models</a>
    <a class="nav-item" data-view="config">Config</a>
    <a class="nav-item" data-view="data">Data</a>
  </nav>
  <main id="main">
    <div id="content"></div>
  </main>
</div>

<script>
/* ===== Utilities ===== */
const fmtCur = (n, dp=2) => (n == null ? "—" : (n < 0 ? "-" : "") + "$" + Math.abs(n).toLocaleString(undefined, { minimumFractionDigits: dp, maximumFractionDigits: dp }));
const fmtNum = (n, dp=2) => (n == null || isNaN(n) ? "—" : Number(n).toFixed(dp));
const fmtPct = (n, dp=2) => (n == null ? "—" : (n * 100).toFixed(dp) + "%");
const fmtPnl = (n, dp=2) => (n == null ? "—" : (n >= 0 ? "+" : "") + n.toLocaleString(undefined, { minimumFractionDigits: dp, maximumFractionDigits: dp }));
const fmtTime = ms => ms ? new Date(ms).toISOString().replace("T", " ").slice(0, 19) + " UTC" : "";
const upDown = n => n > 0 ? "up" : n < 0 ? "down" : "dim";

async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

/* ===== Router ===== */
const views = {};
let currentView = "dashboard";
let refreshHandle = null;

function nav(view) {
  currentView = view;
  document.querySelectorAll("#sidebar .nav-item").forEach(a => {
    a.classList.toggle("active", a.dataset.view === view);
  });
  if (refreshHandle) clearInterval(refreshHandle);
  const render = views[view] || views.dashboard;
  render();
  refreshHandle = setInterval(render, 30_000);
}

document.querySelectorAll("#sidebar .nav-item").forEach(a => {
  a.addEventListener("click", () => nav(a.dataset.view));
});

/* ===== Header refresh ===== */
async function refreshTick() {
  try {
    const s = await api("/api/shadow/state");
    const el = document.getElementById("tick-status");
    if (!s.has_ledger) {
      el.innerHTML = `<span class="dot stale"></span>no ledger`;
    } else {
      const stale = s.minutes_since_last_bar > 120;
      const errs = s.consecutive_errors >= 3;
      const cls = errs ? "down" : stale ? "stale" : "";
      const status = errs ? "runner errors" : stale ? "stale" : "live";
      el.innerHTML = `<span class="dot ${cls}"></span>${status}`;
    }
    document.getElementById("tick-time").textContent = new Date().toISOString().replace("T", " ").slice(0, 19);
  } catch (e) { /* ignore */ }
}
setInterval(refreshTick, 15_000);
refreshTick();

/* ===== Chart utility ===== */
function svgLineChart(points, valueKey, height = 200, stroke = "#58a6ff", fill = "rgba(88,166,255,0.10)") {
  if (!points.length) return `<div class="empty">no data</div>`;
  const vals = points.map(p => p[valueKey]);
  const yMin = Math.min(...vals), yMax = Math.max(...vals);
  const yRange = (yMax - yMin) || 1;
  const w = 900, h = height, pad = 20;
  const iw = w - 2 * pad, ih = h - 2 * pad;
  const pts = vals.map((v, i) => {
    const x = pad + (i / (vals.length - 1 || 1)) * iw;
    const y = pad + (1 - (v - yMin) / yRange) * ih;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  const area = `${pad},${pad + ih} ` + pts + ` ${pad + iw},${pad + ih}`;
  return `<svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polygon points="${area}" fill="${fill}" stroke="none"/>
    <polyline points="${pts}" fill="none" stroke="${stroke}" stroke-width="1.5"/>
    <text x="${pad}" y="14" fill="#8b98a5" font-size="10">max ${yMax.toFixed(2)}</text>
    <text x="${pad}" y="${h - 4}" fill="#8b98a5" font-size="10">min ${yMin.toFixed(2)}</text>
  </svg>`;
}

/* =====================================================
   View: Dashboard
   ===================================================== */
views.dashboard = async () => {
  const container = document.getElementById("content");
  container.innerHTML = `<h1>Dashboard</h1><div id="dash-body">loading…</div>`;
  try {
    const [state, hist, positions, alerts, clusters] = await Promise.all([
      api("/api/shadow/state"),
      api("/api/shadow/metrics-history?hours=168"),
      api("/api/shadow/positions"),
      api("/api/shadow/alerts?hours=24"),
      api("/api/analytics/clusters/shadow"),
    ]);
    const body = document.getElementById("dash-body");
    if (!state.has_ledger) {
      body.innerHTML = `<div class="empty">Shadow runner has not persisted a ledger yet.<br>Run <code class="mono">rabbit shadow run</code> first.</div>`;
      return;
    }
    body.innerHTML = `
      <div class="kpi-row">
        <div class="kpi"><div class="label">Equity</div>
          <div class="value ${upDown(state.total_pnl)}">${fmtCur(state.equity)}</div>
          <div class="sub">initial ${fmtCur(state.initial_capital, 0)}</div></div>
        <div class="kpi"><div class="label">Total PnL</div>
          <div class="value ${upDown(state.total_pnl)}">${fmtPnl(state.total_pnl)}</div>
          <div class="sub">${fmtPct(state.pnl_pct)}</div></div>
        <div class="kpi"><div class="label">Drawdown</div>
          <div class="value ${state.drawdown_pct >= 0.10 ? 'down' : ''}">${fmtPct(state.drawdown_pct)}</div>
          <div class="sub">peak ${fmtCur(state.peak_equity, 0)}</div></div>
        <div class="kpi"><div class="label">Winrate</div>
          <div class="value">${fmtPct(state.winrate, 1)}</div>
          <div class="sub">${state.closed_trades} closed</div></div>
        <div class="kpi"><div class="label">Profit factor</div>
          <div class="value">${fmtNum(state.profit_factor)}</div>
          <div class="sub">PF</div></div>
        <div class="kpi"><div class="label">Open positions</div>
          <div class="value">${state.open_positions}</div>
          <div class="sub">live</div></div>
      </div>
      <div class="panel">
        <div class="panel-header"><span>Equity curve — 7 day</span></div>
        <div class="panel-body no-pad">${svgLineChart(hist.points, "equity")}</div>
      </div>
      <div class="grid-2">
        <div class="panel">
          <div class="panel-header"><span>Open positions</span><span class="count">${positions.positions.length}</span></div>
          <div class="panel-body no-pad">${renderPositionsTable(positions.positions)}</div>
        </div>
        <div class="panel">
          <div class="panel-header"><span>Alerts (24h)</span><span class="count">${alerts.alerts.length}</span></div>
          <div class="panel-body no-pad">${renderAlertsTable(alerts.alerts)}</div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header"><span>Live per-cluster performance</span><span class="count">${clusters.total_trades} trades</span></div>
        <div class="panel-body no-pad">${renderClustersTable(clusters.clusters)}</div>
      </div>
    `;
  } catch (e) {
    document.getElementById("dash-body").innerHTML = `<div class="empty">error: ${e.message}</div>`;
  }
};

function renderPositionsTable(rows) {
  if (!rows.length) return `<div class="empty">no open positions</div>`;
  return `<table class="data"><thead><tr>
    <th>Symbol</th><th>Side</th><th>Size</th><th>Entry</th><th>Stop</th><th>TP</th></tr></thead><tbody>
    ${rows.map(r => `<tr>
      <td>${r.symbol}</td>
      <td><span class="badge ${r.side === 'long' ? 'up' : 'down'}">${r.side}</span></td>
      <td class="num">${r.size.toFixed(4)}</td>
      <td class="num">${fmtNum(r.entry_price)}</td>
      <td class="num">${fmtNum(r.stop)}</td>
      <td class="num">${fmtNum(r.take_profit)}</td>
    </tr>`).join("")}</tbody></table>`;
}

function renderAlertsTable(rows) {
  if (!rows.length) return `<div class="empty" style="color:var(--up)">all clear</div>`;
  return `<table class="data"><thead><tr>
    <th>Time (UTC)</th><th>Alert</th></tr></thead><tbody>
    ${rows.map(r => `<tr>
      <td class="mono dim">${fmtTime(r.timestamp_ms).slice(0, 16)}</td>
      <td class="warn">${r.alerts}</td>
    </tr>`).join("")}</tbody></table>`;
}

function renderClustersTable(rows) {
  if (!rows.length) return `<div class="empty">no closed trades yet</div>`;
  return `<table class="data"><thead><tr>
    <th>Cluster</th><th>N</th><th>Winrate</th><th>Total PnL</th><th>Avg</th><th>PF</th><th>Sharpe</th></tr></thead><tbody>
    ${rows.map(r => r.n === 0 ? `<tr><td>${r.cluster}<div class="mute" style="font-size:10px">${r.description}</div></td><td colspan="6" class="mute">—</td></tr>` : `<tr>
      <td>${r.cluster}<div class="mute" style="font-size:10px">${r.description}</div></td>
      <td class="num">${r.n}</td>
      <td class="num ${r.winrate >= 0.5 ? 'up' : 'down'}">${fmtPct(r.winrate, 1)}</td>
      <td class="num ${upDown(r.total_pnl)}">${fmtPnl(r.total_pnl)}</td>
      <td class="num">${fmtPnl(r.avg_pnl)}</td>
      <td class="num">${r.profit_factor == null ? "∞" : fmtNum(r.profit_factor)}</td>
      <td class="num">${fmtNum(r.sharpe_est)}</td>
    </tr>`).join("")}</tbody></table>`;
}

/* =====================================================
   View: Shadow — deeper detail
   ===================================================== */
views.shadow = async () => {
  const el = document.getElementById("content");
  el.innerHTML = `<h1>Shadow — Live Detail</h1><div id="body">loading…</div>`;
  try {
    const [state, hist, trades] = await Promise.all([
      api("/api/shadow/state"),
      api("/api/shadow/metrics-history?hours=720"),
      api("/api/shadow/trades?limit=50"),
    ]);
    if (!state.has_ledger) {
      document.getElementById("body").innerHTML = `<div class="empty">no shadow ledger</div>`;
      return;
    }
    document.getElementById("body").innerHTML = `
      <div class="panel">
        <div class="panel-header"><span>Equity — 30 day</span></div>
        <div class="panel-body no-pad">${svgLineChart(hist.points, "equity")}</div>
      </div>
      <div class="panel">
        <div class="panel-header"><span>Drawdown from peak (%)</span></div>
        <div class="panel-body no-pad">${svgLineChart(hist.points.map(p => ({...p, dd_pct: p.drawdown_from_peak_pct * 100})), "dd_pct", 160, "#e5484d", "rgba(229,72,77,0.10)")}</div>
      </div>
      <div class="panel">
        <div class="panel-header"><span>Recent closed trades</span><span class="count">${trades.trades.length}</span></div>
        <div class="panel-body no-pad">${renderTradesTable(trades.trades)}</div>
      </div>
    `;
  } catch (e) {
    document.getElementById("body").innerHTML = `<div class="empty">error: ${e.message}</div>`;
  }
};

function renderTradesTable(rows) {
  if (!rows.length) return `<div class="empty">no closed trades</div>`;
  return `<table class="data"><thead><tr>
    <th>Symbol</th><th>Side</th><th>PnL</th><th>Exit</th><th>Bars</th><th>Time</th></tr></thead><tbody>
    ${rows.map(r => `<tr>
      <td>${r.symbol}</td>
      <td><span class="badge ${r.side === 'long' ? 'up' : 'down'}">${r.side}</span></td>
      <td class="num ${upDown(r.pnl)}">${fmtPnl(r.pnl)}</td>
      <td class="mute">${r.exit_reason || ""}</td>
      <td class="num mute">${r.bars_held}</td>
      <td class="mono dim">${fmtTime(r.exit_time_ms).slice(0, 16)}</td>
    </tr>`).join("")}</tbody></table>`;
}

/* =====================================================
   View: Backtests
   ===================================================== */
views.backtests = async () => {
  const el = document.getElementById("content");
  el.innerHTML = `<h1>Backtests</h1><div id="body">loading…</div>`;
  try {
    const list = await api("/api/backtests");
    if (!list.reports.length) {
      document.getElementById("body").innerHTML = `<div class="empty">no reports</div>`;
      return;
    }
    document.getElementById("body").innerHTML = `
      <div class="panel">
        <div class="panel-header"><span>Reports</span><span class="count">${list.reports.length}</span></div>
        <div class="panel-body no-pad">
          <table class="data"><thead><tr>
            <th>Name</th><th>Trades</th><th>WR</th><th>PnL</th><th>PF</th><th>Sharpe</th><th>Max DD</th></tr></thead><tbody>
            ${list.reports.map(r => `<tr onclick="showBacktest('${r.name}')" style="cursor:pointer">
              <td><a class="link">${r.name}</a></td>
              <td class="num">${r.n_trades}</td>
              <td class="num ${r.winrate >= 0.5 ? 'up' : 'down'}">${fmtPct(r.winrate, 1)}</td>
              <td class="num ${upDown(r.total_pnl)}">${fmtPnl(r.total_pnl)}</td>
              <td class="num">${r.profit_factor == null ? "∞" : fmtNum(r.profit_factor)}</td>
              <td class="num">${fmtNum(r.sharpe_est)}</td>
              <td class="num down">${fmtPnl(r.max_drawdown)}</td>
            </tr>`).join("")}
          </tbody></table>
        </div>
      </div>
      <div id="detail"></div>
    `;
  } catch (e) {
    document.getElementById("body").innerHTML = `<div class="empty">error: ${e.message}</div>`;
  }
};

window.showBacktest = async (name) => {
  const detail = document.getElementById("detail");
  detail.innerHTML = `<div class="empty">loading ${name}…</div>`;
  try {
    const [d, cl] = await Promise.all([
      api(`/api/backtests/${name}`),
      api(`/api/analytics/clusters/report/${name}`),
    ]);
    detail.innerHTML = `
      <div class="panel">
        <div class="panel-header"><span>${name} — summary</span></div>
        <div class="panel-body">
          <div class="kpi-row">
            <div class="kpi"><div class="label">Trades</div><div class="value">${d.n_trades}</div></div>
            <div class="kpi"><div class="label">Winrate</div><div class="value">${fmtPct(d.winrate, 1)}</div></div>
            <div class="kpi"><div class="label">Total PnL</div><div class="value ${upDown(d.total_pnl)}">${fmtPnl(d.total_pnl)}</div></div>
            <div class="kpi"><div class="label">Sharpe</div><div class="value">${fmtNum(d.sharpe_est)}</div></div>
            <div class="kpi"><div class="label">PF</div><div class="value">${d.profit_factor == null ? "∞" : fmtNum(d.profit_factor)}</div></div>
            <div class="kpi"><div class="label">Max DD</div><div class="value down">${fmtPnl(d.max_drawdown)}</div></div>
          </div>
        </div>
      </div>
      <div class="grid-2">
        <div class="panel">
          <div class="panel-header"><span>Top 20 trades by |PnL|</span></div>
          <div class="panel-body no-pad">${renderTradesTable(d.top_trades)}</div>
        </div>
        <div class="panel">
          <div class="panel-header"><span>Per-cluster performance</span></div>
          <div class="panel-body no-pad">${renderClustersTable(cl.clusters)}</div>
        </div>
      </div>
    `;
  } catch (e) {
    detail.innerHTML = `<div class="empty">error: ${e.message}</div>`;
  }
};

/* =====================================================
   View: Analytics (baselines + drift)
   ===================================================== */
views.analytics = async () => {
  const el = document.getElementById("content");
  el.innerHTML = `<h1>Analytics</h1><div id="body">loading…</div>`;
  try {
    const [clusters, baselines] = await Promise.all([
      api("/api/analytics/clusters/shadow"),
      api("/api/analytics/baselines"),
    ]);
    document.getElementById("body").innerHTML = `
      <div class="panel">
        <div class="panel-header"><span>Live per-cluster (shadow)</span><span class="count">${clusters.total_trades} trades</span></div>
        <div class="panel-body no-pad">${renderClustersTable(clusters.clusters)}</div>
      </div>
      <div class="panel">
        <div class="panel-header"><span>Baselines</span><span class="count">${baselines.baselines.length}</span></div>
        <div class="panel-body">
          ${baselines.baselines.length === 0 ? '<div class="empty">no baselines. Run <code class="mono">rabbit baseline</code> or <code class="mono">rabbit baseline-features</code>.</div>' : `
            <table class="data"><thead><tr><th>Name</th><th>Size</th><th>Drift</th></tr></thead><tbody>
            ${baselines.baselines.map(b => `<tr>
              <td>${b.name}</td>
              <td class="num mute">${(b.size_bytes/1024).toFixed(1)} KB</td>
              <td><a class="link" onclick="showDrift('${b.name}')">check drift →</a></td>
            </tr>`).join("")}
            </tbody></table>
          `}
        </div>
      </div>
      <div id="drift-panel"></div>
    `;
  } catch (e) {
    document.getElementById("body").innerHTML = `<div class="empty">error: ${e.message}</div>`;
  }
};

window.showDrift = async (baseline) => {
  const el = document.getElementById("drift-panel");
  el.innerHTML = `<div class="empty">checking drift…</div>`;
  try {
    const d = await api(`/api/analytics/drift?baseline=${encodeURIComponent(baseline)}`);
    if (d.message) {
      el.innerHTML = `<div class="panel"><div class="panel-header"><span>Drift — ${baseline}</span></div><div class="empty">${d.message}</div></div>`;
      return;
    }
    el.innerHTML = `<div class="panel">
      <div class="panel-header">
        <span>Drift — ${baseline}</span>
        <span class="badge ${d.ok ? 'up' : 'down'}">${d.ok ? 'OK' : 'ALERT'}</span>
      </div>
      <div class="panel-body no-pad">
        <table class="data"><thead><tr>
          <th>Cluster</th><th>N</th><th>Baseline WR</th><th>Live WR</th><th>Δ WR</th><th>z</th><th>Status</th></tr></thead><tbody>
          ${d.findings.map(f => `<tr>
            <td>${f.cluster}</td>
            <td class="num">${f.live_n}</td>
            <td class="num mute">${fmtPct(f.baseline_winrate, 1)}</td>
            <td class="num">${fmtPct(f.live_winrate, 1)}</td>
            <td class="num ${f.winrate_delta >= 0 ? 'up' : 'down'}">${(f.winrate_delta*100).toFixed(1)}pp</td>
            <td class="num">${fmtNum(f.avg_pnl_zscore)}</td>
            <td><span class="badge ${f.triggered ? 'down' : 'up'}">${f.triggered ? 'drift' : 'ok'}</span></td>
          </tr>`).join("")}
        </tbody></table>
      </div>
    </div>`;
  } catch (e) {
    el.innerHTML = `<div class="empty">error: ${e.message}</div>`;
  }
};

/* =====================================================
   View: Config
   ===================================================== */
views.config = async () => {
  const el = document.getElementById("content");
  el.innerHTML = `<h1>Config</h1><div id="body">loading…</div>`;
  try {
    const [current, hist] = await Promise.all([
      api("/api/config/current"),
      api("/api/config/history"),
    ]);
    document.getElementById("body").innerHTML = `
      <div class="grid-2">
        <div class="panel">
          <div class="panel-header"><span>Current default.yaml</span></div>
          <div class="panel-body"><pre>${current.content ? escapeHtml(current.content) : "(missing)"}</pre></div>
        </div>
        <div class="panel">
          <div class="panel-header"><span>Snapshot history</span><span class="count">${hist.entries.length}</span></div>
          <div class="panel-body no-pad">
            ${hist.entries.length === 0 ? '<div class="empty">no snapshots</div>' : `
              <table class="data"><thead><tr>
                <th>Idx</th><th>Hash</th><th>Timestamp</th><th>Note</th></tr></thead><tbody>
              ${hist.entries.map(e => `<tr>
                <td class="mute">${e.index}</td>
                <td class="mono">${e.config_hash}</td>
                <td class="mono dim">${e.timestamp_utc.slice(0, 19)}</td>
                <td class="mute">${e.note}</td>
              </tr>`).join("")}</tbody></table>`}
          </div>
        </div>
      </div>
      ${hist.entries.length >= 2 ? renderDiffPanel() : ""}
    `;
    if (hist.entries.length >= 2) loadDiff();
  } catch (e) {
    document.getElementById("body").innerHTML = `<div class="empty">error: ${e.message}</div>`;
  }
};

function renderDiffPanel() {
  return `<div class="panel">
    <div class="panel-header"><span>Diff — previous vs latest</span></div>
    <div class="panel-body"><pre id="config-diff">loading…</pre></div>
  </div>`;
}

async function loadDiff() {
  try {
    const d = await api("/api/config/diff?rev_a=previous&rev_b=latest");
    const el = document.getElementById("config-diff");
    if (!d.diff) { el.textContent = "(no changes)"; return; }
    // Colorize +/- lines
    el.innerHTML = d.diff.split("\n").map(line => {
      if (line.startsWith("+") && !line.startsWith("+++")) return `<span class="up">${escapeHtml(line)}</span>`;
      if (line.startsWith("-") && !line.startsWith("---")) return `<span class="down">${escapeHtml(line)}</span>`;
      if (line.startsWith("@@")) return `<span class="mute">${escapeHtml(line)}</span>`;
      return escapeHtml(line);
    }).join("\n");
  } catch (e) { /* silent */ }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
}

/* =====================================================
   View: Data health
   ===================================================== */
views.data = async () => {
  const el = document.getElementById("content");

    document.getElementById("body").innerHTML = `
      <div class="kpi-row">
        <div class="kpi"><div class="label">Symbols healthy</div>
          <div class="value up">${d.summary.healthy} / ${d.summary.total}</div></div>
        <div class="kpi"><div class="label">Unhealthy</div>
          <div class="value ${d.summary.unhealthy ? 'down' : ''}">${d.summary.unhealthy}</div></div>
      </div>
      <div class="panel">
        <div class="panel-header"><span>Per-symbol health</span></div>
        <div class="panel-body no-pad">
          ${d.reports.length === 0 ? '<div class="empty">no data</div>' : `
            <table class="data"><thead><tr>
              <th>Symbol</th><th>Interval</th><th>Status</th><th>Rows</th><th>Last bar</th><th>Missing</th><th>Max gap (h)</th><th>Problems</th></tr></thead><tbody>
            ${d.reports.map(r => `<tr>
              <td>${r.symbol}</td>
              <td class="mute">${r.interval}</td>
              <td><span class="badge ${status_color(r.status)}">${r.status}</span></td>
              <td class="num">${r.rows}</td>
              <td class="mono dim">${r.last_ts ? r.last_ts.slice(0, 19) : ""}</td>
              <td class="num ${r.missing_bars ? 'warn' : ''}">${r.missing_bars}</td>
              <td class="num">${r.max_gap_hours}</td>
              <td class="mute">${r.problems || ""}</td>

        </div>
      </div>
    `;
  } catch (e) {
    document.getElementById("body").innerHTML = `<div class="empty">error: ${e.message}</div>`;
  }
};
