name: trend_following
version: "0.1.3"
params:
  ema_fast: 20
  ema_slow: 60
  ema_trend: 200
  adx_threshold: 40
  volume_ratio_threshold: 1.5
  confirm_ema_fast: 20
  confirm_adx_threshold: 25
  # funding_weight temporarily zeroed while Binance is unreachable from
  # the current deployment (funding history is sourced from Binance, not
  # OKX, because OKX only retains ~90 days). Restore to 0.20 once the
  # runner has a working network path to fapi.binance.com. Score max
  # drops from 1.0 to 0.80 while zeroed — open_action_threshold is 0.50
  # so decent signals still fire, they just need slightly stronger
  # EMA/ADX/volume/confirm evidence.
  funding_weight: 0.0
  funding_threshold: 0.0003
  # v0.1.3: Extreme-momentum gate — only score when the bar shows deep
  # oversold/overbought (RSI) or extreme deviation (z-score). Cluster analysis
  # showed 16/16 Cluster-4 (trend continuation without extreme momentum)
  # trades were losers; enabling this gate removes them.
  require_extreme_momentum: true
  rsi_short_threshold: 30.0
  rsi_long_threshold: 70.0
  zscore_extreme_threshold: 1.5
