data:
  exchange: okx
  symbols: [
    BTC-USDT-SWAP, ETH-USDT-SWAP, SOL-USDT-SWAP, XRP-USDT-SWAP,
    DOGE-USDT-SWAP, AVAX-USDT-SWAP, LINK-USDT-SWAP, ADA-USDT-SWAP, DOT-USDT-SWAP
  ]
  main_interval: "1H"
  confirm_interval: "15m"
  history_window_days: 730

feature_engine:
  version: "0.1.0"
  cache_enabled: true

strategy_router:
  composer: max_score
  open_action_threshold: 0.50
  enabled_strategies:
    trend_following:
      weight: 1.0
      config_file: strategies/trend_following.yaml
    ml_scoring:
      weight: 1.0
      config_file: strategies/ml_scoring.yaml
    # price_action: disabled in multi-symbol regime — loses -$1250 total
    # over 1620 trades at 34% WR. See phase-multi-symbol branch data.

risk:
  risk_per_trade_pct: 0.5
  atr_stop_multiplier: 2.5
  reward_risk_ratio: 2.5
  max_leverage: 3
  daily_max_loss_pct: 3.0
  hold_timeout_bars: 96
  trailing_enabled: false  # disabled — proven to hurt trend_following

execution:
  fees:
    maker: 0.0002
    taker: 0.0005
  slippage_atr_multiplier: 0.1
  funding_settlement: true

backtest:
  start: "2024-07-05"
  end: "2026-07-05"
  initial_capital: 10000

report:
  output_dir: reports
  ai_context: true

hard_rules:
  enabled: true
  min_quote_volume_24h: 1000000.0
  atr_pct_max_multiplier: 5.0
  atr_pct_baseline_window: 500

portfolio_risk:
  enabled: true
  correlation_window_bars: 720
  max_correlation_threshold: 0.7
  correlated_size_reduction: 0.5
  max_gross_leverage: 8.0

circuit_breaker:
  enabled: true
  atr_shock_multiplier: 3.0
  emergency_close_on_shock: true

chop_kill_switch:
  enabled: true
  window: 10
  wr_threshold: 0.35
  pause_bars: 48

btc_crash_boost:
  enabled: true
  btc_symbol: "BTC-USDT-SWAP"
  zscore_threshold: 2.5
  boost_multiplier: 1.2
